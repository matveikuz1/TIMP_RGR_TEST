services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: filesdb
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d filesdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SECRET_KEY: super-secret-change-me
      ACCESS_TOKEN_EXPIRE_MINUTES: 20
      ALGORITHM: HS256
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/filesdb
      UPLOADS_DIR: /app/uploads
      MAX_FILE_SIZE_MB: 100
      ALLOWED_MIME_TYPES: image/jpeg,image/png,audio/mpeg,video/mp4,video/x-msvideo,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/zip,application/pdf,text/plain
      COOKIE_NAME: access_token
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: strict
      SMTP_HOST: smtp.yandex.ru
      SMTP_PORT: 587
      SMTP_USER: Gasdonos@yandex.ru
      SMTP_PASSWORD: lpobjvnekvhtrktw
      SMTP_TLS: "true"
      CORS_ALLOW_ORIGINS: "https://217.71.129.139:4160,https://localhost:4160"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - backend_logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  pg_data:
  uploads_data:
  backend_logs:
