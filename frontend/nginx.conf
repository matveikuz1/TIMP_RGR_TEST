server {
    # listen 443 ssl default_server означает, что Nginx примет любой HTTPS запрос на этот порт
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    
    server_name _; # Символ подчеркивания означает "любой хост/IP"

    # Пути к вашим самоподписанным сертификатам
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Строгие протоколы безопасности для РГР (ИБ)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Раздача фронтенда (React / Vite)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Обратное проксирование к FastAPI бэкенду
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Защита кук: принудительно выставляем флаги безопасности для РГР
        proxy_cookie_path / "/; Secure; HttpOnly; SameSite=Strict";
    }
}
